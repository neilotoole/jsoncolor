# golangci-lint v2 configuration. Migrated from the v1 "golden config"
# (https://gist.github.com/maratori/47a4d00457a92aa426dbd48a18776322).
version: "2"
run:
  tests: false
linters:
  default: none
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - cyclop
    - dupl
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - forbidigo
    - funlen
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - gomodguard_v2
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - loggercheck
    - makezero
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nosprintfhostport
    - predeclared
    - promlinter
    - reassign
    - revive
    - staticcheck
    - testableexamples
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - whitespace
  settings:
    cyclop:
      max-complexity: 50
      package-average: 10
    errcheck:
      check-type-assertions: true
    exhaustive:
      check:
        - switch
        - map
    funlen:
      lines: 150
      statements: 100
    gocognit:
      min-complexity: 50
    gocritic:
      settings:
        captLocal:
          paramsOnly: false
        underef:
          skipRecvDeref: false
    gocyclo:
      min-complexity: 50
    gomodguard_v2:
      blocked:
        - module: github.com/golang/protobuf
          recommendations:
            - google.golang.org/protobuf
          reason: see https://developers.google.com/protocol-buffers/docs/reference/go/faq#modules
        - module: github.com/satori/go.uuid
          recommendations:
            - github.com/google/uuid
          reason: satori's package is not maintained
        - module: github.com/gofrs/uuid
          recommendations:
            - github.com/google/uuid
          reason: gofrs' package is not go module
    govet:
      disable:
        - fieldalignment
      enable-all: true
      settings:
        shadow:
          strict: false
    lll:
      line-length: 120
      tab-width: 1
    mnd:
      ignored-numbers:
        - "2"
        - "3"
      ignored-functions:
        - make
        - os.Chmod
        - os.Mkdir
        - os.MkdirAll
        - os.OpenFile
        - os.WriteFile
        - prometheus.ExponentialBuckets
        - prometheus.ExponentialBucketsRange
        - prometheus.LinearBuckets
    nakedret:
      max-func-lines: 0
    nestif:
      min-complexity: 20
    nolintlint:
      require-explanation: false
      require-specific: true
      allow-no-explanation:
        - funlen
        - gocognit
        - lll
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - lll
        source: ^//\s*go:generate\s
      - linters:
          - godot
        source: (noinspection|TODO)
      - linters:
          - gocritic
        source: //noinspection
      - linters:
          - errorlint
        source: ^\s+if _, ok := err\.\([^.]+\.InternalError\); ok {
      - linters:
          - bodyclose
          - dupl
          - funlen
          - goconst
          - gosec
          - noctx
          - wrapcheck
        path: _test\.go
    paths:
      - scratch
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 3
formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      module-path: github.com/neilotoole/jsoncolor
      extra-rules: true
  exclusions:
    generated: lax
    paths:
      - scratch
      - third_party$
      - builtin$
      - examples$
