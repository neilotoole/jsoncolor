name: golangci-lint
on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

permissions:
  # Least privilege: golangci-lint only needs to read the repo to check out and lint.
  contents: read
  # `pull-requests: read` is required only if enabling the action's `only-new-issues`
  # option (not used here), so it is intentionally omitted.
  # pull-requests: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          # golangci-lint v2.x, required by the v2 config and the v8 action.
          version: v2.12.2
          args: --issues-exit-code=1

